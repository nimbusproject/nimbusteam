{{ define "main" }}
<article class="post-single">
  {{ if not .Params.hideMeta }}
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ partial "nimbus/meta.html" . }}
  </header>
  {{ with .Params.image }}
  <div class="post-featured-image">
    <img src="{{ . | relURL }}" alt="{{ $.Title }}">
  </div>
  {{ end }}
  {{ end }}
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
