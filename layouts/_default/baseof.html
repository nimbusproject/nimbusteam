<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  {{ with .OutputFormats.Get "rss" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">
  {{ end }}
  <link rel="icon" href='{{ "images/nimbus-logo.png" | relURL }}'>
  <link rel="stylesheet" href='{{ "css/nimbus.css" | relURL }}'>
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "nimbus/header.html" . }}
  <div class="site-frame">
    {{ partial "nimbus/nav.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "nimbus/footer.html" . }}
  </div>
</body>
</html>
