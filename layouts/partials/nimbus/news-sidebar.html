<div class="sidebar-section">
  <h4 class="widget-title">Latest Posts</h4>
  <ul class="cat-post-list">
    {{ range first 5 (where .Site.RegularPages "Section" "news") }}
    <li class="cat-post-item">
      <div><a class="cat-post-title" href="{{ .Permalink }}">{{ .Title }}</a></div>
      <div><span class="cat-post-date">{{ .Date.Format "January 2, 2006" }}</span></div>
    </li>
    {{ end }}
  </ul>
</div>
